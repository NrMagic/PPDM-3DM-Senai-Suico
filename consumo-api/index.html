<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="./style.css">
    <title>Busca, Busca</title>
  </head>
  <body>

    <div class="container">
		
		<div class="row">

			<div class="col-12 text-center">
				<h1 class="mt-2 mb-4">Consulta Placa Dados</h1>
			</div>
			<div class="box-1">

				
					<label for="plate">Buscar por PLACA</label>
					<input type="text" name="plate" id="plate" class="form-control">
	
					<button class="btn btn-primary" id="btn-plate">Buscar</button>
				

			</div>

		</div>

		<hr class="my-4">

		<div class="">

			<button onclick="exportTableToCSV('cnpjs.csv')" class="btn btn-primary mt-2 mb-2">Exportar CSV</button>

			<table class="table">
				<thead>
				<tr>
					<th scope="col">LOGO</th>
					<th scope="col">Ano</th>
					<th scope="col">Marca</th>
					<th scope="col">Modelo</th>
					<th scope="col">Cor</th>
					<th scope="col">Renavam</th>
					<th scope="col">Estado</th>
					<th scope="col">Municipio</th>
					<th scope="col">Chassi</th>
				</tr>
				</thead>
			</table>

		</div>

	</div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.full.min.js"></script>

<script src="script.js"></script>
</body>
</html>
